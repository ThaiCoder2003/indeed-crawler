name: Daily Job Scraper

on:
  schedule:
     - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install axios xlsx cheerio form-data


      - name: Chay Script
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          WEBHOOK_TEAMS: ${{ secrets.WEBHOOK_TEAMS }}
        run: node scraper.js

      - name: Upload Excel Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Indeed-Jobs-Excel
          path: Indeed_Jobs.xlsx